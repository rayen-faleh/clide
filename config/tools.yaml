tools:
  - name: web_search
    transport: stdio
    command: mcp-searxng
    args: []
    env:
      SEARXNG_URL: "http://localhost:8888"
    enabled: true
    description: "Search the web using SearXNG"
  - name: reddit
    transport: stdio
    command: uvx
    args: ["mcp-server-reddit"]
    env: []
    enabled: true
    description: "Interact with reddit"
  - name: minecraft-mcp
    transport: stdio
    command: npx
    args: ["npx", "-y", "github:yuniko-software/minecraft-mcp-server", "--host", "localhost", "--port", "25565", "--username", "Clide"]
    env: []
    enabled: false
    description: "Interact with reddit"
  - name: smallville
    transport: stdio
    command: python
    args: ["-m", "clide.tools.smallville_mcp"]
    env:
      SMALLVILLE_URL: "http://localhost:8080"
      CLIDE_AGENT_NAME: "Clide"
    enabled: false
    description: "Interact with the Smallville village simulation - observe, talk to villagers, explore"
